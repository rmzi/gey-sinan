name: Expo Web Deploy

on:
  push:
    branches:
      - dev
    paths:
      - "apps/expo/**"
  release:
    types:
      - published

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Export & Deploy to S3
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/expo/package-lock.json

      - name: Install dependencies
        working-directory: apps/expo
        run: npm ci

      - name: Export Expo web build
        working-directory: apps/expo
        run: npx expo export --platform web

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set deploy environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "bucket=${{ vars.S3_BUCKET_PROD }}" >> "$GITHUB_OUTPUT"
            echo "distribution=${{ vars.CLOUDFRONT_DISTRIBUTION_PROD }}" >> "$GITHUB_OUTPUT"
          else
            echo "bucket=${{ vars.S3_BUCKET_DEV }}" >> "$GITHUB_OUTPUT"
            echo "distribution=${{ vars.CLOUDFRONT_DISTRIBUTION_DEV }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync to S3
        working-directory: apps/expo
        run: |
          aws s3 sync dist/ "s3://${{ steps.env.outputs.bucket }}/" \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "*.html" \
            --exclude "service-worker.js"
          aws s3 sync dist/ "s3://${{ steps.env.outputs.bucket }}/" \
            --delete \
            --exclude "*" \
            --include "*.html" \
            --include "service-worker.js" \
            --cache-control "public, max-age=0, must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.env.outputs.distribution }}" \
            --paths "/*"
