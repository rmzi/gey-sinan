name: Backend Deploy

on:
  push:
    branches:
      - dev
    paths:
      - "backend/**"
  release:
    types:
      - published

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    env:
      AWS_REGION: us-east-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image tag
        id: meta
        run: |
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
            echo "environment=prod" >> "$GITHUB_OUTPUT"
          else
            echo "tag=dev-${{ github.sha }}" >> "$GITHUB_OUTPUT"
            echo "environment=dev" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ steps.meta.outputs.tag }}
        run: |
          docker build \
            -t "$ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:latest-${{ steps.meta.outputs.environment }}" \
            backend/
          docker push "$ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:latest-${{ steps.meta.outputs.environment }}"
          echo "image=$ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}:$IMAGE_TAG" >> "$GITHUB_OUTPUT"
        id: build

      - name: Download current ECS task definition
        env:
          ENVIRONMENT: ${{ steps.meta.outputs.environment }}
        run: |
          aws ecs describe-task-definition \
            --task-definition "geysinan-backend-$ENVIRONMENT" \
            --query taskDefinition \
            > task-definition.json

      - name: Update ECS task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: backend
          image: ${{ steps.build.outputs.image }}

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: geysinan-backend-${{ steps.meta.outputs.environment }}
          cluster: geysinan-${{ steps.meta.outputs.environment }}
          wait-for-service-stability: true
